name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci_pg_required_token_do_not_use
      JWT_ACCESS_SECRET: ci_jwt_access_secret_min_length_24_chars
      JWT_REFRESH_SECRET: ci_jwt_refresh_secret_min_length_24_chars
      QR_SECRET: ci_qr_secret_minimum_24_chars_long

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node 18 (pinned)
        uses: actions/setup-node@v4
        with:
          node-version: "18.20.4"

      - name: setup Docker
        uses: docker/setup-buildx-action@v3

      - name: build images
        run: docker compose build

      - name: smoke up (health + metrics endpoints)
        run: |
          docker compose up -d postgres redis api worker
          docker compose ps
          for i in $(seq 1 40); do
            API_HEALTH=$(docker compose exec -T api node -e "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" && echo ok || echo fail)
            API_METRICS=$(docker compose exec -T api node -e "fetch('http://localhost:3000/metrics').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" && echo ok || echo fail)
            WORKER_HEALTH=$(docker compose exec -T worker node -e "fetch('http://localhost:9101/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" && echo ok || echo fail)
            WORKER_METRICS=$(docker compose exec -T worker node -e "fetch('http://localhost:9101/metrics').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" && echo ok || echo fail)
            if [ "$API_HEALTH" = "ok" ] && [ "$API_METRICS" = "ok" ] && [ "$WORKER_HEALTH" = "ok" ] && [ "$WORKER_METRICS" = "ok" ]; then
              echo "health/metrics checks OK"
              break
            fi
            sleep 3
          done
          docker compose exec -T api node -e "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1))"
          docker compose exec -T api node -e "fetch('http://localhost:3000/metrics').then(r=>process.exit(r.ok?0:1))"
          docker compose exec -T worker node -e "fetch('http://localhost:9101/health').then(r=>process.exit(r.ok?0:1))"
          docker compose exec -T worker node -e "fetch('http://localhost:9101/metrics').then(r=>process.exit(r.ok?0:1))"

      - name: anti-symlink host path check
        run: |
          docker compose exec -T api sh -lc "ls -la /app/apps/api/node_modules/prisma || true"
          docker compose exec -T api sh -lc "grep -R 'C:/' -n /app/apps/api/node_modules 2>/dev/null | head"

      - name: run tests
        run: ./scripts/test.sh

      - name: run verify
        run: ./scripts/verify.sh

      - name: report status
        if: always()
        run: |
          docker compose ps || true
          docker compose logs --tail=120 api worker postgres redis || true
          docker compose down -v || true
          echo "CI finished with status ${{ job.status }}"
