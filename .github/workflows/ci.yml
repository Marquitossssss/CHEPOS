name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  adr-check:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node 18 (pinned)
        uses: actions/setup-node@v4
        with:
          node-version: "18.20.4"

      - name: lint ADR contract
        run: node ./scripts/lint-adrs.js

  seed-verify-demo-rich:
    runs-on: ubuntu-latest
    needs: adr-check
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: articket
          POSTGRES_USER: articket
          POSTGRES_PASSWORD: ci_pg_required_token_do_not_use
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U articket -d articket"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://articket:ci_pg_required_token_do_not_use@localhost:5432/articket?schema=public
      POSTGRES_PASSWORD: ci_pg_required_token_do_not_use
      REDIS_URL: redis://localhost:6379
      SEED_PROFILE: demo_rich
      JWT_ACCESS_SECRET: ci_jwt_access_secret_min_length_24_chars
      JWT_REFRESH_SECRET: ci_jwt_refresh_secret_min_length_24_chars
      QR_SECRET: ci_qr_secret_minimum_24_chars_long
      PAYMENTS_WEBHOOK_SECRET: ci_webhook_secret_min_24_chars

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node 18 (pinned)
        uses: actions/setup-node@v4
        with:
          node-version: "18.20.4"

      - name: enable corepack
        run: corepack enable

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: migrate
        run: pnpm -w db:migrate

      - name: seed demo_rich
        run: pnpm -w db:seed

      - name: verify demo_rich invariants (json)
        run: pnpm -w seed:verify -- --json > seed-verify.json

      - name: upload seed verification artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seed-verify-demo-rich
          path: seed-verify.json
          if-no-files-found: error

  ci:
    runs-on: ubuntu-latest
    needs: [adr-check, seed-verify-demo-rich]
    env:
      POSTGRES_PASSWORD: ci_pg_required_token_do_not_use
      JWT_ACCESS_SECRET: ci_jwt_access_secret_min_length_24_chars
      JWT_REFRESH_SECRET: ci_jwt_refresh_secret_min_length_24_chars
      QR_SECRET: ci_qr_secret_minimum_24_chars_long

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node 18 (pinned)
        uses: actions/setup-node@v4
        with:
          node-version: "18.20.4"

      - name: setup Docker
        uses: docker/setup-buildx-action@v3

      - name: build images
        run: docker compose build

      - name: smoke up (health + metrics + anti-symlink)
        run: ./scripts/runtime-smoke.sh

      - name: run tests
        run: ./scripts/test.sh

      - name: run verify
        run: ./scripts/verify.sh

      - name: report status
        if: always()
        run: |
          docker compose ps || true
          docker compose logs --tail=120 api worker postgres redis || true
          docker compose down -v || true
          echo "CI finished with status ${{ job.status }}"
