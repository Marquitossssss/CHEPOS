name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  adr-check:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node 18 (pinned)
        uses: actions/setup-node@v4
        with:
          node-version: "18.20.4"

      - name: lint ADR contract
        run: node ./scripts/lint-adrs.js

  api-tests-postgres:
    runs-on: ubuntu-latest
    needs: adr-check
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: articket_ci
          POSTGRES_USER: articket
          POSTGRES_PASSWORD: articket
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U articket -d articket_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://articket:articket@localhost:5432/articket_ci?schema=public
      JWT_ACCESS_SECRET: ci_jwt_access_secret_min_length_24_chars
      JWT_REFRESH_SECRET: ci_jwt_refresh_secret_min_length_24_chars
      QR_SECRET: ci_qr_secret_minimum_24_chars_long

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node 18 (pinned)
        uses: actions/setup-node@v4
        with:
          node-version: "18.20.4"

      - name: enable corepack
        run: corepack enable

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: apply prisma migrations
        run: pnpm --filter @articket/api db:migrate

      - name: run api tests
        run: pnpm --filter @articket/api test

  ci:
    runs-on: ubuntu-latest
    needs: [adr-check, api-tests-postgres]
    env:
      POSTGRES_PASSWORD: ci_pg_required_token_do_not_use
      JWT_ACCESS_SECRET: ci_jwt_access_secret_min_length_24_chars
      JWT_REFRESH_SECRET: ci_jwt_refresh_secret_min_length_24_chars
      QR_SECRET: ci_qr_secret_minimum_24_chars_long

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node 18 (pinned)
        uses: actions/setup-node@v4
        with:
          node-version: "18.20.4"

      - name: setup Docker
        uses: docker/setup-buildx-action@v3

      - name: build images
        run: docker compose build

      - name: smoke up (health + metrics + anti-symlink)
        run: ./scripts/runtime-smoke.sh

      - name: run tests
        run: ./scripts/test.sh

      - name: run verify
        run: ./scripts/verify.sh

      - name: report status
        if: always()
        run: |
          docker compose ps || true
          docker compose logs --tail=120 api worker postgres redis || true
          docker compose down -v || true
          echo "CI finished with status ${{ job.status }}"
