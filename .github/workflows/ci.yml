name: CI

on:
  push:
    branches: [main, work]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci_postgres_required_value_123456
      JWT_ACCESS_SECRET: ci_jwt_access_secret_min_length_24_chars
      JWT_REFRESH_SECRET: ci_jwt_refresh_secret_min_length_24_chars
      QR_SECRET: ci_qr_secret_minimum_24_chars_long

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: articket
          POSTGRES_USER: articket
          POSTGRES_PASSWORD: ci_postgres_required_value_123456
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U articket -d articket"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node 18 (pinned)
        uses: actions/setup-node@v4
        with:
          node-version: '18.20.4'

      - name: setup Docker
        uses: docker/setup-buildx-action@v3

      - name: build
        run: docker compose build

      - name: run tests
        run: ./scripts/test.sh

      - name: run verify
        run: ./scripts/verify.sh

      - name: report status
        if: always()
        run: echo "CI finished with status ${{ job.status }}"
