services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-articket}
      POSTGRES_USER: ${POSTGRES_USER:-articket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres_password}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-articket}
      POSTGRES_USER: ${POSTGRES_USER:-articket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres_password}
      DATABASE_URL: postgresql://${POSTGRES_USER:-articket}:${POSTGRES_PASSWORD:-change_me_postgres_password}@postgres:5432/${POSTGRES_DB:-articket}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      QR_SECRET: ${QR_SECRET:-change_me_qr}
      API_PORT: 3000
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-articket}
      POSTGRES_USER: ${POSTGRES_USER:-articket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres_password}
      DATABASE_URL: postgresql://${POSTGRES_USER:-articket}:${POSTGRES_PASSWORD:-change_me_postgres_password}@postgres:5432/${POSTGRES_DB:-articket}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh}
      QR_SECRET: ${QR_SECRET:-change_me_qr}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-change_me_sendgrid_api_key}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@articket.local}
      SENDGRID_TEMPLATE_ORDER_PAID: ${SENDGRID_TEMPLATE_ORDER_PAID:-}
    depends_on:
      - postgres
      - redis
    command: ["pnpm", "worker:notifications"]


  api-test:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-articket}
      POSTGRES_USER: ${POSTGRES_USER:-articket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres_password}
      DATABASE_URL: postgresql://${POSTGRES_USER:-articket}:${POSTGRES_PASSWORD:-change_me_postgres_password}@postgres:5432/${POSTGRES_DB:-articket}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh}
      QR_SECRET: ${QR_SECRET:-change_me_qr}
      NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
    depends_on:
      - postgres
      - redis
    command: ["pnpm", "test"]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  pg_data:
